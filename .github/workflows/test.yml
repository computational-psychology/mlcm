# This workflow will install Python dependencies and run tests with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os}} / py${{ matrix.python_version }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [Ubuntu]
        python_version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    permissions: 
        contents: write
    env:
        R_KEEP_PKG_SOURCE: yes
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Install Python ${{ matrix.python_version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python_version }}
          architecture: x64

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        # At some point, should replace this and installing deps, with some renv action

      - name: Install MLCM R package
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::MLCM

      - name: Install python testing requirements
        run: |
          python -m pip install --upgrade pip setuptools
          pip install pytest

      - name: Install mlcm to be tested
        run: pip install .

      - name: Run tests for ${{ matrix.python_version }}
        run: pytest -vv
